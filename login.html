<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Victory</title>
  <style>
    :root {
      --primary: #6c63ff;
      --secondary: #2f2a8f;
      --text: #201f4a;
      --bg-overlay: rgba(255, 255, 255, 0.82);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://raw.githubusercontent.com/victory2050/Interactive/main/Ondas3.png")
        center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: var(--primary);
    }

    p {
      margin: 0 0 22px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--secondary);
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d8d8ef;
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.94;
    }

    .error {
      margin-top: 14px;
      color: #b42318;
      font-size: 0.95rem;
      min-height: 1.2em;
    }

    .hint {
      margin-top: 18px;
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Acceso privado</h1>
    <p>Ingrese la clave para continuar.</p>

    <form id="loginForm">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingrese su contraseña" required />
      <button type="submit">Entrar</button>
      <div class="error" id="errorMsg"></div>
    </form>

    <div class="hint">Acceso de demostración. La seguridad real no vive en frontend, por si alguien quería jugar a espía.</div>
  </div>

  <script>
    const ACCESS_PASSWORD = "victory";

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if (password === ACCESS_PASSWORD) {
        sessionStorage.setItem("victory_access", "granted");
        window.location.href = "index.html";
      } else {
        errorMsg.textContent = "Contraseña incorrecta.";
      }
    });
  </script>
</body>
</html>
